<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 1: Album Ảnh</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .album-container {
            display: flex;
            flex-wrap: wrap; /* Cho phép ảnh xuống hàng trên màn hình nhỏ */
            justify-content: center; /* Căn giữa các ảnh */
            gap: 20px; /* Khoảng cách giữa các ảnh */
            margin-top: 20px;
        }
        img { 
            width: 100%; /* Chiều rộng tối đa là 100% của container cha */
            max-width: 350px; /* Giới hạn chiều rộng tối đa của mỗi ảnh */
            height: auto; /* Giữ đúng tỷ lệ ảnh */
            border: 3px solid white; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        img:hover {
            transform: scale(1.05); /* Phóng to nhẹ khi di chuột qua */
        }
    </style>
</head>
<body>

    <h1>Album ảnh: Trường Đại học Lạc Hồng</h1>

    <div class="album-container">
        <img src="./image/LHU_1.jpg" alt="Ảnh chụp tập thể giảng viên và sinh viên trong một sự kiện tại hội trường Đại học Lạc Hồng." title="Sự kiện tại Đại học Lạc Hồng">
        <img src="./image/LHU_2.jpg" alt="Một giảng viên đang thuyết trình về tỉnh Đồng Nai trong một buổi học hoặc hội thảo tại LHU." title="Bài giảng về tỉnh Đồng Nai">
        <img src="./image/LHU_3.jpg" alt="Đoàn giảng viên và sinh viên trong chuyến thăm hoặc hợp tác quốc tế tại một trường đại học đối tác." title="Hoạt động hợp tác quốc tế">
    </div>

</body>
</html>
