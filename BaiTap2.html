<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 2: Nhúng Video</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .video-container {
            position: relative;
            padding-bottom: 30.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            max-height: 320px; /* Giới hạn chiều cao tối đa của video */
            max-width: 800px; /* Giới hạn chiều rộng tối đa của video */
            background: #000;
            margin: 20px auto;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .back-button:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <h1>Nhúng Video bài giảng từ YouTube</h1>
    <div class="video-container">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/kqtD5dpn9C8" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <a href="index.html" class="back-button">Quay về Trang chủ</a>
</body>
</html>
